name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# 显式声明所需权限
permissions:
  contents: write
  actions: read

jobs:
  build-windows:
    name: Build Windows Desktop App
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build Windows release
        run: flutter build windows --release

      - name: Create zip archive
        shell: pwsh
        run: |
          $buildPath = "build\windows\x64\runner\Release"
          $zipName = "ChannelCloner-Windows-x64.zip"
          Compress-Archive -Path "$buildPath\*" -DestinationPath $zipName
          Write-Host "Created: $zipName"
          Get-Item $zipName | Select-Object Name, Length

      - name: Upload artifact (always available)
        uses: actions/upload-artifact@v4
        with:
          name: ChannelCloner-Windows-x64
          path: ChannelCloner-Windows-x64.zip
          retention-days: 30

      - name: Create Git tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        shell: pwsh
        run: |
          $tagName = "v1.0.${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $tagName
          git push origin $tagName
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          tag: v1.0.${{ github.run_number }}
          name: "Channel Cloner v1.0.${{ github.run_number }}"
          body: |
            ## Channel Cloner - Windows桌面版

            ### 📥 安装说明
            1. 下载 `ChannelCloner-Windows-x64.zip`
            2. 解压到任意目录（推荐非C盘）
            3. 双击运行 `channel_cloner.exe`

            ### ✅ v1.1 新增/修复
            - ✅ **用户API账号**：添加验证按钮，配置 API ID + API Hash 后可验证
            - ✅ **媒体组整组转发**：多图/多视频自动以批量方式保持为一条消息转发
            - ✅ **广告自动过滤**：内置规则（链接/@用户名/广告词）+ 自定义关键词
            - ✅ **AI接口修复**：模型下拉正确显示可选模型，测试连接使用实际填写的Key

            ### 📋 完整功能
            - 无引用转发（不显示来源频道）
            - 一对一 / 多对多频道克隆
            - 多账号管理（Bot Token / 用户API）
            - 自由选择消息范围（起止消息ID）
            - 24小时自动监听，新内容实时转发
            - 广告自动过滤 + 自定义关键词
            - AI文案改写（OpenAI / DeepSeek / 通义千问 / 智谱GLM / Kimi / 自定义）
            - 内容类型过滤（图片/视频/文档/音频/贴纸）
            - 完整转发记录和运行日志
          artifacts: ChannelCloner-Windows-x64.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          makeLatest: true
