name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          cache: true
      
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Analyze code
        run: flutter analyze
        continue-on-error: true
      
      - name: Build Windows Release
        run: flutter build windows --release
      
      - name: Package Windows build
        shell: powershell
        run: |
          $buildDir = "build\windows\x64\runner\Release"
          $zipName = "ChannelCloner_Windows_v${{ github.run_number }}.zip"
          Compress-Archive -Path "$buildDir\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChannelCloner-Windows
          path: "*.zip"
          retention-days: 30
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: "v1.2.${{ github.run_number }}"
          name: "Channel Cloner v1.2.${{ github.run_number }}"
          body: |
            ## 更新日志
            
            ### 🔧 核心修复
            - **修复克隆任务转发失败**：公开频道自动通过 t.me/s/ 网页抓取真实消息ID，无需Bot读取历史消息权限
            - **修复私有频道**：使用Bot API验证频道访问权限，提供清晰的错误提示和解决方案
            - **详细错误诊断**：转发失败时显示Telegram真实错误代码和描述，而非模糊的"消息不存在"
            - **连续权限错误自动停止**：避免无效的大量失败请求
            
            ### 🤖 AI文案润色改进
            - **新增 Groq 免费AI**：速度极快，有免费额度（控制台注册获取Key）
            - 支持模型：llama-3.1-8b-instant、llama3-70b-8192、gemma2-9b-it 等
            - Pollinations AI 继续提供完全免费的润色服务
            - OpenRouter 提供多个免费模型
            
            ### ✅ 仍支持的全部功能
            - Bot账号：公开/私有频道无引用转发
            - 用户API账号：安装Python+Telethon后读取任意频道（包括私有）
            - 媒体组整组无引用转发
            - AI文案润色（监听模式实时有效）
            - 广告过滤、视频MD5修改
            
            ### 📥 下载安装
            1. 下载下方 `ChannelCloner_Windows_*.zip`
            2. 解压到任意目录
            3. 运行 `channel_cloner.exe`
            
            > **私有频道读取增强**：安装 Python 3 + `pip install telethon` 可解锁用户API账号读取私有频道功能
          files: "*.zip"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
